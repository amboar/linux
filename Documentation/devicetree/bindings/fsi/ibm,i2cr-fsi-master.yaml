%YAML 1.2
---
$id: http://devicetree.org/schemas/fsi/ibm,i2cr-fsi-master.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: IBM I2C Responder virtual FSI master

maintainers:
  - Eddie James <eajames@linux.ibm.com>

description: |
  The I2C Responder (I2CR) is a an I2C device that's connected to an FSI CFAM
  (see fsi.txt). The I2CR translates I2C bus operations to FSI CFAM reads and
  writes or SCOM operations, thereby acting as an FSI master.

properties:
  compatible:
    enum:
      - ibm,i2cr-fsi-master

  reg:
    maxItems: 1

  "#address-cells":
    const: 2

  "#size-cells":
    const: 0

patternProperties:
  "cfam@[0-9a-f],[0-9a-f]":
    type: object
    properties:
      chip-id:
        $ref: /schemas/types.yaml#/definitions/uint32

      reg:
        maxItems: 1

      "#address-cells":
        const: 1

      "#size-cells":
        const: 1

    additionalProperties: true

  "scom@[0-9a-f]+":
    type: object
    properties:
      compatible:
        const: ibm,i2cr-scom

      reg:
        maxItems: 1

    additionalProperties: false

  "sbefifo@[0-9a-f]+":
    type: object
    properties:
      compatible:
        const: ibm,p9-sbefifo

      reg:
        maxItems: 1

      "#address-cells":
        const: 1

      "#size-cells":
        const: 0

    additionalProperties: false

required:
  - compatible
  - reg

additionalProperties: true

examples:
  - |
    i2c {
      #address-cells = <1>;
      #size-cells = <0>;

      i2cr@20 {
        compatible = "ibm,i2cr-fsi-master";
        reg = <0x20>;
      };
    };
